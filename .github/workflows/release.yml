name: Release

# Tag pushen (z.B. v0.0.1) -> baut Binaries und hängt sie an ein GitHub Release.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            ext: ""
            asset: lofi-radio-linux-amd64
          - os: windows-latest
            ext: ".exe"
            asset: lofi-radio-windows-amd64
          - os: macos-latest
            ext: ""
            asset: lofi-radio-macos-arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install ALSA headers (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Build
        # Version aus dem Tag in das Binary injizieren.
        run: go build -ldflags "-s -w -X main.version=${{ github.ref_name }}" -o "${{ matrix.asset }}${{ matrix.ext }}" .

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}${{ matrix.ext }}
          draft: true
          generate_release_notes: true

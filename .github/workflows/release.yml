name: Release

# Tag pushen (z.B. v0.0.1) -> baut das Windows-Binary und hängt es an ein Release.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build
        # Version aus dem Tag in das Binary injizieren.
        run: go build -ldflags "-s -w -X main.version=${{ github.ref_name }}" -o lofi-radio-windows-amd64.exe .

      - name: Draft release
        uses: softprops/action-gh-release@v2
        with:
          files: lofi-radio-windows-amd64.exe
          draft: true
          generate_release_notes: true

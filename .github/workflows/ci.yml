name: CI

on:
  push:
    branches: [master]
  pull_request:

# Simpel: bauen + testen auf Windows (primäres Ziel; dort kein cgo/ALSA nötig).
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build
        run: go build ./...

      # -short überspringt die Tests, die Netzwerk brauchen (Streaming/Wetter).
      - name: Test
        run: go test -short ./...

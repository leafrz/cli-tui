name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      # oto/beep braucht auf Linux die ALSA-Header (cgo).
      - name: Install ALSA headers
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      # -short überspringt die Tests, die Netzwerk brauchen (Streaming/Wetter).
      - name: Test
        run: go test -short ./...
